# 短链服务 nginx 反代配置
# 直接放入 /etc/nginx/conf.d/ 即可生效
# sudo cp shorturl-proxy.conf /etc/nginx/conf.d/shorturl.conf
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name s.vectorac.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name s.vectorac.com;

    ssl_certificate     /etc/nginx/cert/vectorac.com.pem;
    ssl_certificate_key /etc/nginx/cert/vectorac.com.key;

    location / {
        proxy_pass         http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}